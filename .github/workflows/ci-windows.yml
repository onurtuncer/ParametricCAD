name: CI · Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC Debug
            preset: windows-msvc-ci-debug
            build_preset: windows-msvc-ci-debug
            test_preset: windows-msvc-ci-debug

          - name: Windows MSVC Release
            preset: windows-msvc-ci-release
            build_preset: windows-msvc-ci-release
            test_preset: windows-msvc-ci-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
        env:
          VCPKG_ROOT: C:\vcpkg

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.test_preset }} --output-on-failure
